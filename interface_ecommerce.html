<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement - E-commerce</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); max-width: 900px; width: 100%; overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px; text-align: center; }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { font-size: 16px; opacity: 0.9; }
        .content { padding: 40px; }
        .section-title { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 25px; display: flex; align-items: center; }
        .section-title::before { content: ''; width: 4px; height: 24px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 2px; margin-right: 12px; }
        .options-grid { display: grid; gap: 20px; margin-bottom: 40px; }
        .option { border: 2px solid #e0e0e0; border-radius: 12px; padding: 24px; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .option:hover { border-color: #667eea; box-shadow: 0 8px 24px rgba(102, 126, 234, 0.15); transform: translateY(-2px); }
        .option.selected { border-color: #667eea; background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%); }
        .option input[type="radio"] { position: absolute; opacity: 0; cursor: pointer; width: 100%; height: 100%; top: 0; left: 0; }
        .option-header { display: flex; align-items: center; margin-bottom: 12px; }
        .radio-custom { width: 24px; height: 24px; border: 2px solid #e0e0e0; border-radius: 50%; margin-right: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; flex-shrink: 0; }
        .option.selected .radio-custom { border-color: #667eea; background: #667eea; }
        .radio-custom::after { content: '✓'; color: white; font-weight: bold; opacity: 0; font-size: 14px; transition: opacity 0.3s ease; }
        .option.selected .radio-custom::after { opacity: 1; }
        .option-title { font-size: 16px; font-weight: 600; color: #333; }
        .option-subtitle { font-size: 14px; color: #666; margin-bottom: 8px; line-height: 1.4; }
        .price { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
        .badge { display: inline-block; background: #e8f3ff; color: #0066cc; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-top: 8px; }
        .badge.featured { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .assurance { background: #f0f7ff; border-left: 4px solid #0066cc; padding: 12px 16px; border-radius: 8px; margin-top: 12px; font-size: 13px; color: #333; line-height: 1.5; }
        .assurance strong { color: #0066cc; }
        .summary { background: #f5f5f5; border-radius: 12px; padding: 24px; margin-bottom: 30px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; }
        .summary-row.total { border-top: 2px solid #ddd; padding-top: 12px; margin-top: 12px; font-size: 18px; font-weight: 700; }
        .button-group { display: flex; gap: 12px; margin-top: 30px; }
        .btn { flex: 1; padding: 14px 24px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(102, 126, 234, 0.4); }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .btn-secondary:hover { background: #d0d0d0; }
        .info-message { background: #f0f7ff; border: 1px solid #b3d9ff; color: #003366; padding: 16px; border-radius: 10px; margin-bottom: 30px; font-size: 14px; line-height: 1.6; }
        @media (max-width: 768px) { .content { padding: 24px; } .header { padding: 24px; } .header h1 { font-size: 22px; } .price { font-size: 20px; } .button-group { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛒 Finalisez votre commande</h1>
            <p>Sélectionnez votre mode de paiement</p>
        </div>
        <div class="content">
            <div class="info-message">ℹ️ Tous nos modes de paiement incluent une protection complète de votre achat.</div>
            <div class="section-title">Mode de paiement</div>
            <div class="options-grid">
                <label class="option selected">
                    <input type="radio" name="payment" value="classic" checked>
                    <div class="option-header"><div class="radio-custom"></div><div class="option-title">Je achète maintenant</div></div>
                    <div class="price">2 499,00 €</div>
                    <div class="option-subtitle">Paiement unique à la validation de la commande</div>
                    <div class="badge">Paiement complet</div>
                </label>
                <label class="option">
                    <input type="radio" name="payment" value="installments">
                    <div class="option-header"><div class="radio-custom"></div><div class="option-title">Je paie en 3 fois</div></div>
                    <div class="price">3 × 833,00 €</div>
                    <div class="option-subtitle">Sans frais • Débits espacés de 30 jours</div>
                    <div class="badge">Paiement fractionné</div>
                </label>
                <label class="option">
                    <input type="radio" name="payment" value="usage">
                    <div class="option-header"><div class="radio-custom"></div><div class="option-title">Je paye à l'utilisation</div></div>
                    <div class="price">49,99 € / mois</div>
                    <div class="option-subtitle">Renvoyez-le nous quand vous le souhaitez, sans engagement</div>
                    <div class="assurance"><strong>✓ Assurance casse, vol et perte incluse</strong><br>Couverture complète pendant toute la durée de votre abonnement</div>
                    <div class="badge featured">NOUVELLE OFFRE</div>
                </label>
            </div>
            <div class="summary">
                <div class="section-title">Résumé de votre commande</div>
                <div class="summary-row"><span>Produit sélectionné</span><span>2 499,00 €</span></div>
                <div class="summary-row"><span>Frais d'expédition</span><span>Gratuit</span></div>
                <div class="summary-row total"><span>À payer</span><span id="total">2 499,00 €</span></div>
            </div>
            <div class="button-group">
                <button class="btn btn-secondary">Continuer le shopping</button>
                <button class="btn btn-primary">Procéder au paiement</button>
            </div>
        </div>
    </div>
    <script>
        const paymentOptions = document.querySelectorAll('input[name="payment"]');
        const totalElement = document.getElementById('total');
        const options = document.querySelectorAll('.option');
        const prices = { classic: '2 499,00 €', installments: '3 × 833,00 €', usage: '49,99 € / mois' };
        paymentOptions.forEach(option => {
            option.addEventListener('change', function() {
                options.forEach(opt => opt.classList.remove('selected'));
                this.closest('.option').classList.add('selected');
                totalElement.textContent = prices[this.value];
            });
        });
    </script>
</body>
</html>
